# Phase 3B: Fujitsu Protocol Integration - LISTEN MODE (hardware wired)
# ESP32 connected as secondary slave on LIN bus via TJA1021/SIT1021T
# UART on GPIO16 (RX) / GPIO17 (TX), 500 baud 8N1
# Goal: capture and decode all bus traffic to build protocol map

esphome:
  name: aircon
  friendly_name: "Aircon"
  project:
    name: "james.retro-fujitsu"
    version: "3B.2"
  on_boot:
    priority: 600
    then:
      - logger.log: "Fujitsu Phase 3B - Listen Mode (hardware wired)"
      - light.turn_on:
          id: status_light
          brightness: 100%
          effect: "Boot Pattern"

esp32:
  board: esp32dev
  framework:
    type: arduino

# Enable verbose logging to see protocol details
logger:
  level: VERBOSE
  baud_rate: 115200
  logs:
    fujitsu.heatpump: DEBUG
    fujitsu.climate: DEBUG
    uart: VERBOSE

# UART for LIN bus communication via TJA1021/SIT1021T transceiver
# Pull-up on RX pin prevents the floating-pin crash when not wired to bus
uart:
  id: fuji_uart
  tx_pin: GPIO17
  rx_pin:
    number: GPIO16
    mode:
      input: true
      pullup: true   # Critical: prevents RX float → garbage bytes → crash when bus disconnected
  baud_rate: 500
  data_bits: 8
  parity: NONE
  stop_bits: 1

# WiFi
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  ap:
    ssid: "Aircon-Fallback"
    password: "fallback123"
  
  on_connect:
    - logger.log: "WiFi Connected!"
    - light.turn_on:
        id: status_light
        brightness: 100%
        effect: "WiFi Connected"
  
  on_disconnect:
    - logger.log: "WiFi Disconnected!"
    - light.turn_on:
        id: status_light
        brightness: 100%
        effect: "WiFi Error"

captive_portal:

# Home Assistant API
api:
  on_client_connected:
    - logger.log: "Home Assistant Connected!"
    - light.turn_on:
        id: status_light
        brightness: 100%
        effect: "HA Connected"
  
  on_client_disconnected:
    - logger.log: "Home Assistant Disconnected!"
    - light.turn_on:
        id: status_light
        brightness: 100%
        effect: "HA Disconnected"

# OTA updates
ota:
  - platform: esphome

# Safe mode: if the device crashes on boot 10 times in a row, it enters a
# minimal mode (WiFi + OTA only) so you can flash a fix without physical access.
safe_mode:
  num_attempts: 10
  reboot_timeout: 10min

# External component - Fujitsu Climate
external_components:
  - source:
      type: local
      path: components
    components: [ fujitsu_climate ]
    refresh: 0s

# Fujitsu Climate Entity
climate:
  - platform: fujitsu_climate
    name: "Fujitsu Heat Pump"
    id: fujitsu_hp
    uart_id: fuji_uart

# Status LED with patterns
light:
  - platform: status_led
    id: status_light
    name: "Status LED"
    pin:
      number: GPIO2
      inverted: false
    effects:
      - strobe:
          name: "Boot Pattern"
          colors:
            - state: true
              duration: 200ms
            - state: false
              duration: 200ms
      
      - strobe:
          name: "WiFi Connected"
          colors:
            - state: true
              duration: 100ms
            - state: false
              duration: 1900ms
      
      - strobe:
          name: "WiFi Error"
          colors:
            - state: true
              duration: 200ms
            - state: false
              duration: 200ms
      
      - strobe:
          name: "HA Connected"
          colors:
            - state: true
              duration: 500ms
            - state: false
              duration: 1500ms
      
      - strobe:
          name: "HA Disconnected"
          colors:
            - state: true
              duration: 300ms
            - state: false
              duration: 700ms

# Web server
web_server:
  port: 80
  version: 3

# Diagnostic sensors
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    id: wifi_signal_sensor
    update_interval: 30s

  - platform: uptime
    name: "Uptime"
    id: uptime_sensor
    update_interval: 60s

  - platform: template
    name: "Free Heap Memory"
    lambda: return heap_caps_get_free_size(MALLOC_CAP_INTERNAL);
    unit_of_measurement: "bytes"
    update_interval: 60s
    entity_category: diagnostic

# Text sensors
text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: ip_address
    ssid:
      name: "WiFi SSID"
    mac_address:
      name: "MAC Address"

  - platform: version
    name: "ESPHome Version"

# Binary sensors
binary_sensor:
  - platform: status
    name: "Status"
    id: system_status

# Switches
switch:
  - platform: restart
    name: "Restart"

# Buttons
button:
  - platform: safe_mode
    name: "Safe Mode Boot"
    entity_category: diagnostic

# Diagnostic interval
interval:
  - interval: 300s
    then:
      - logger.log:
          format: "Status - WiFi: %.0f dBm, Uptime: %.1f hrs, Heap: %d bytes"
          args:
            - 'id(wifi_signal_sensor).state'
            - 'id(uptime_sensor).state / 3600.0'
            - 'heap_caps_get_free_size(MALLOC_CAP_INTERNAL)'

# Time
time:
  - platform: homeassistant
    id: homeassistant_time
